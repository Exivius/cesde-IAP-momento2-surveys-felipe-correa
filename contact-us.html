<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend></legend>
        <form action="">
            <section class="contact_input">
                <label for="">Ingrese su nombre:
                    <input type="text" name="" id="" placeholder="Digite nombre" required>
                </label>
                <label for="">Email:
                    <input type="email" name="" id="" placeholder="Digite su email" required>
                </label>
                <label for="">Genero:
                    <input type="radio" name="" id="">Masculino
                    <input type="radio" name="" id="">Femenino
                    <input type="radio" name="" id="">Otro
                </label>
                <label for="">Intereses
                    <input type="checkbox" name="" id="">Lenguajes de programación
                    <input type="checkbox" name="" id="">Hábitos de estudio en programación
                    <input type="checkbox" name="" id="">Uso de IA para programar
                    <input type="checkbox" name="" id="">Git y GitHub
                    <input type="checkbox" name="" id="">Metodologías ágiles
                </label>
                <label for="">Como te enteraste de nosotros?
                    <select name="" id="">
                        <option value="">Redes sociales</option>
                        <option value="">Amigos o conocidos</option>
                        <option value="">Institución educativa</option>
                        <option value="">Trabajo</option>
                        <option value="">Publicidad</option>
                    </select>
                </label>
                <label for="">Comentarios y sugerencias:
                    <textarea name="" id="" placeholder="Escriba acá su sugerencia"></textarea>
                </label>
            </section>
            <section class="contact-button">
                <button type="submit">Enviar</button>
            </section>
        </form>
    </fieldset>
</body>
</html>
